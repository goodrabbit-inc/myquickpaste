name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site bundle
        run: |
          mkdir _site
          cp .nojekyll _site/ 2>/dev/null || true
          cp index.html style.css i18n.js favicon.ico sitemap.xml _site/
          cp support.html privacy.html release-notes.html _site/
          cp -r images i18n business _site/
          if [ -f robots.txt ]; then cp robots.txt _site/; fi
          if [ -d videos ]; then cp -r videos _site/; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
