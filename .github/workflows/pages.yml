name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site bundle
        run: |
          mkdir _site
          cp .nojekyll _site/ 2>/dev/null || true
          cp index.html style.css i18n.js favicon.ico sitemap.xml _site/
          cp support.html privacy.html release-notes.html _site/
          if [ -d privacy ]; then cp -r privacy _site/; fi
          cp -r images i18n business _site/
          if [ -f robots.txt ]; then cp robots.txt _site/; fi
          if [ -d videos ]; then cp -r videos _site/; fi

      - name: Validate sitemap.xml
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from urllib.parse import urlparse

          NS = {"sm": "http://www.sitemaps.org/schemas/sitemap/0.9"}
          root = ET.parse("sitemap.xml").getroot()
          if root.tag != "{http://www.sitemaps.org/schemas/sitemap/0.9}urlset":
              raise SystemExit("sitemap root must be urlset")

          urls = root.findall("sm:url", NS)
          if not urls:
              raise SystemExit("sitemap must contain at least one url")

          prefix = "https://goodrabbit-inc.github.io/myquickpaste/"
          for url in urls:
              loc = url.find("sm:loc", NS)
              if loc is None or not loc.text:
                  raise SystemExit("each url needs loc")
              value = loc.text.strip()
              if not value.startswith(prefix):
                  raise SystemExit(f"loc must stay under site prefix: {value}")
              parsed = urlparse(value)
              if parsed.scheme != "https" or parsed.netloc != "goodrabbit-inc.github.io":
                  raise SystemExit(f"invalid loc host/scheme: {value}")

          print(f"sitemap OK ({len(urls)} urls)")
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify live sitemap and robots.txt
        run: |
          set -euo pipefail
          BASE="https://goodrabbit-inc.github.io/myquickpaste"
          sleep 20
          curl -fsSL "${BASE}/sitemap.xml" -o /tmp/sitemap.xml
          curl -fsSL "${BASE}/robots.txt" -o /tmp/robots.txt
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse("/tmp/sitemap.xml")
          robots = open("/tmp/robots.txt", encoding="utf-8").read()
          expected = "Sitemap: https://goodrabbit-inc.github.io/myquickpaste/sitemap.xml"
          if expected not in robots:
              raise SystemExit("robots.txt missing sitemap directive")
          print("live sitemap.xml and robots.txt verified")
          PY
