<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MyQuickPaste for Business</title>
  <meta data-i18n-attr="content:meta.description" name="description">
  <link rel="icon" href="images/logo.png" type="image/png">
  <link rel="stylesheet" href="css/business.css">
</head>
<body data-page="home">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <img class="logo-sm" src="images/logo.png" width="34" height="34" alt="">
        <span class="brand-text">
          <span class="brand-name" data-i18n="brand.name"></span>
          <span class="brand-sub" data-i18n="brand.edition"></span>
        </span>
      </a>
      <div class="lang-picker">
        <button type="button" class="lang-picker-btn" id="lang-picker-btn" aria-haspopup="listbox" aria-expanded="false">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          <span class="lang-current">日本語</span>
        </button>
        <ul class="lang-picker-menu" id="lang-picker-menu" role="listbox" hidden>
          <li role="option" data-lang="ja">日本語</li>
          <li role="option" data-lang="en">English</li>
        </ul>
      </div>
      <button type="button" class="nav-toggle" id="nav-toggle" aria-controls="nav-panel" aria-expanded="false" aria-label="Menu">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="nav-panel" id="nav-panel">
        <nav class="nav" aria-label="Main">
          <a href="index.html" data-nav="home" data-i18n="nav.home"></a>
          <a href="support.html" data-nav="support" data-i18n="nav.support"></a>
          <a href="release-notes.html" data-nav="releaseNotes" data-i18n="nav.releaseNotes"></a>
          <a href="privacy.html" data-nav="privacy" data-i18n="nav.privacy"></a>
        </nav>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner hero-grid">
      <div class="hero-copy">
        <span class="platform-badge">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
          <span data-i18n="hero.badge"></span>
        </span>
        <p class="hero-wordmark" data-i18n="brand.name"></p>
        <p class="hero-edition" data-i18n="brand.edition"></p>
        <h1 class="hero-catch" data-i18n="hero.catch"></h1>
        <p class="hero-lead" data-i18n="hero.lead"></p>
        <div class="store-row hero-stores">
          <a class="store-btn store-btn-primary" id="play-store-link" href="#">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M3.6 1.8c-.3.2-.5.6-.5 1v18.4c0 .4.2.8.5 1l.1.1 10.3-10.3v-.2L3.7 1.7l-.1.1zm11.8 8.5-2.8-2.8 3.9-2.2c.7-.4 1.2-.1 1.2.7v5.8c0 .8-.5 1.1-1.2.7l-3.9-2.2 2.8-2.8v-.2zM14.4 10.3l2.8 2.8 6.5-3.7c.7-.4.7-1 0-1.4l-6.5-3.7-2.8 2.8 2.8 2.8-2.8 2.8zM3.7 1.7l10.3 10.3 2.8-2.8L6.5 3.9 3.7 1.7zm0 20.6 2.8-2.8 10.3-10.3-2.8-2.8L3.7 22.3z"/></svg>
            <span data-i18n="stores.googlePlay"></span>
          </a>
          <span class="store-btn store-btn-soon" aria-disabled="true">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M18.7 12.1c0-1.2-.7-2.3-1.8-2.8l-8.5-4.9c-1.1-.6-2.4-.6-3.5 0s-1.8 1.6-1.8 2.8v9.8c0 1.2.7 2.3 1.8 2.8l8.5 4.9c1.1.6 2.4.6 3.5 0s1.8-1.6 1.8-2.8v-9.8zm-1.8 0c0 .6-.3 1.1-.9 1.4l-8.5 4.9c-.6.3-1.3.3-1.9 0s-.9-.8-.9-1.4V7.3c0-.6.3-1.1.9-1.4l8.5-4.9c.6-.3 1.3-.3 1.9 0s.9.8.9 1.4v4.8z"/></svg>
            <span data-i18n="stores.appStore"></span>
            <span class="store-soon-tag" data-i18n="stores.comingSoon"></span>
          </span>
        </div>
        <p class="platform-line" data-i18n="hero.platformLine"></p>
        <p class="trust-line" data-i18n="hero.trust"></p>
        <div class="trial-banner">
          <div class="trial-icon">30</div>
          <div>
            <strong data-i18n="hero.trialTitle"></strong>
            <p data-i18n="hero.trialText"></p>
          </div>
        </div>
      </div>
      <div class="phone-frame">
        <img src="images/phone-screenshot-placeholder.svg" width="390" height="780" alt="" loading="eager">
      </div>
    </div>
  </section>

  <main>
    <section class="section" id="compare">
      <div class="section-head">
        <h2 data-i18n="compare.title"></h2>
        <p data-i18n="compare.subtitle"></p>
      </div>
      <div class="compare-strip">
        <article class="compare-card">
          <h3 data-i18n="compare.pcTitle"></h3>
          <p data-i18n="compare.pcText"></p>
          <p><a href="../index.html" data-i18n="compare.pcLink"></a></p>
        </article>
        <article class="compare-card is-current">
          <h3 data-i18n="compare.mobileTitle"></h3>
          <p data-i18n="compare.mobileText"></p>
        </article>
      </div>
      <p class="pricing-note" data-i18n="compare.note"></p>
    </section>

    <section class="section" id="problem">
      <div class="section-head">
        <h2 data-i18n="problem.title"></h2>
      </div>
      <div class="problem-box">
        <ul class="problem-list" data-i18n-list="problem.items"></ul>
        <p class="problem-solution" data-i18n="problem.solution"></p>
      </div>
    </section>

    <section class="section" id="steps">
      <div class="section-head">
        <h2 data-i18n="steps.title"></h2>
        <p data-i18n="steps.subtitle"></p>
      </div>
      <div class="steps" data-i18n-steps="steps.items"></div>
    </section>

    <section class="section" id="benefits">
      <div class="section-head">
        <h2 data-i18n="benefits.title"></h2>
      </div>
      <div data-i18n-benefits="benefits.items"></div>
    </section>

    <section class="section" id="features">
      <div class="section-head">
        <h2 data-i18n="features.title"></h2>
        <p data-i18n="features.subtitle"></p>
      </div>
      <div data-i18n-features="features.items"></div>
      <p class="categories-label"><strong data-i18n="features.categoriesLabel"></strong></p>
      <div class="category-chips" data-i18n-chips="features.categories"></div>
    </section>

    <section class="section" id="usecases">
      <div class="section-head">
        <h2 data-i18n="usecases.title"></h2>
      </div>
      <div data-i18n-usecases="usecases.items"></div>
    </section>

    <section class="section" id="pricing">
      <div class="section-head">
        <h2 data-i18n="pricing.title"></h2>
        <p data-i18n="pricing.subtitle"></p>
      </div>
      <div class="pricing-grid">
        <article class="price-card">
          <h3 data-i18n="pricing.freeTitle"></h3>
          <p class="price" data-i18n="pricing.freePrice"></p>
          <ul data-i18n-pricing-list="pricing.freeItems"></ul>
        </article>
        <article class="price-card price-card-pro">
          <h3 data-i18n="pricing.proTitle"></h3>
          <p class="price" data-i18n="pricing.proPrice"></p>
          <ul data-i18n-pricing-list="pricing.proItems"></ul>
        </article>
      </div>
      <p class="pricing-note" data-i18n="pricing.note"></p>
    </section>

    <section class="section privacy-highlight" id="privacy">
      <h2 data-i18n="privacySection.title"></h2>
      <p data-i18n="privacySection.text"></p>
      <p><a href="privacy.html" data-i18n="privacySection.link"></a></p>
    </section>

    <section class="section cta-block" id="download">
      <h2 data-i18n="cta.title"></h2>
      <p data-i18n="cta.lead"></p>
      <div class="store-row">
        <a class="store-btn store-btn-primary sticky-play-link" href="#">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M3.6 1.8c-.3.2-.5.6-.5 1v18.4c0 .4.2.8.5 1l.1.1 10.3-10.3v-.2L3.7 1.7l-.1.1zm11.8 8.5-2.8-2.8 3.9-2.2c.7-.4 1.2-.1 1.2.7v5.8c0 .8-.5 1.1-1.2.7l-3.9-2.2 2.8-2.8v-.2z"/></svg>
          <span data-i18n="cta.button"></span>
        </a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <nav class="footer-links" aria-label="Footer">
      <a href="support.html" data-i18n="nav.support"></a>
      <a href="release-notes.html" data-i18n="nav.releaseNotes"></a>
      <a href="privacy.html" data-i18n="nav.privacy"></a>
      <a href="../index.html" data-i18n="footer.pcEdition"></a>
    </nav>
    <p data-i18n="footer.copyright"></p>
    <p data-i18n="footer.developer"></p>
  </footer>

  <aside class="sticky-cta" aria-label="Download">
    <div class="sticky-cta-inner">
      <a class="store-btn store-btn-primary" id="sticky-play-store-link" href="#">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M3.6 1.8c-.3.2-.5.6-.5 1v18.4c0 .4.2.8.5 1l.1.1 10.3-10.3v-.2L3.7 1.7l-.1.1z"/></svg>
        <span data-i18n="stores.googlePlay"></span>
      </a>
      <span class="store-btn store-btn-soon" aria-disabled="true">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M18.7 12.1c0-1.2-.7-2.3-1.8-2.8l-8.5-4.9c-1.1-.6-2.4-.6-3.5 0s-1.8 1.6-1.8 2.8v9.8c0 1.2.7 2.3 1.8 2.8l8.5 4.9c1.1.6 2.4.6 3.5 0s1.8-1.6 1.8-2.8v-9.8z"/></svg>
        <span data-i18n="stores.appStore"></span>
        <span class="store-soon-tag" data-i18n="stores.comingSoon"></span>
      </span>
    </div>
  </aside>

  <script src="js/i18n.js"></script>
  <script>
    document.addEventListener("mqp:i18n-ready", function () {
      var href = document.getElementById("play-store-link").getAttribute("href");
      document.querySelectorAll(".sticky-play-link, #sticky-play-store-link").forEach(function (el) {
        el.setAttribute("href", href);
      });
    });
  </script>
</body>
</html>
