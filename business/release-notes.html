<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Release Notes — MyQuickPaste for Business</title>
  <meta data-i18n-attr="content:meta.description" name="description">
  <link rel="icon" href="images/logo.png" type="image/png">
  <link rel="stylesheet" href="css/business.css">
</head>
<body data-page="releaseNotes">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <img class="logo-sm" src="images/logo.png" width="34" height="34" alt="">
        <span class="brand-text">
          <span class="brand-name" data-i18n="brand.name"></span>
          <span class="brand-sub" data-i18n="brand.edition"></span>
        </span>
      </a>
      <div class="lang-picker">
        <button type="button" class="lang-picker-btn" id="lang-picker-btn" aria-haspopup="listbox" aria-expanded="false">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          <span class="lang-current">日本語</span>
        </button>
        <ul class="lang-picker-menu" id="lang-picker-menu" role="listbox" hidden>
          <li role="option" data-lang="ja">日本語</li>
          <li role="option" data-lang="en">English</li>
        </ul>
      </div>
      <button type="button" class="nav-toggle" id="nav-toggle" aria-controls="nav-panel" aria-expanded="false" aria-label="Menu">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="nav-panel" id="nav-panel">
        <nav class="nav" aria-label="Main">
          <a href="index.html" data-nav="home" data-i18n="nav.home"></a>
          <a href="support.html" data-nav="support" data-i18n="nav.support"></a>
          <a href="release-notes.html" data-nav="releaseNotes" data-i18n="nav.releaseNotes"></a>
          <a href="privacy.html" data-nav="privacy" data-i18n="nav.privacy"></a>
        </nav>
      </div>
    </div>
  </header>
  <div class="page-hero">
    <h1 class="page-title" data-i18n="releaseNotesPage.title"></h1>
    <p class="page-lead" data-i18n="releaseNotesPage.lead"></p>
    <p class="page-lead release-latest"><strong data-i18n="releaseNotesPage.latestPrefix"></strong> v1.0.0</p>
    <p class="page-lead" data-i18n="releaseNotesPage.storeNote"></p>
  </div>
  <div class="content" data-i18n-releases="releaseNotesPage.entries"></div>
  <footer class="site-footer">
    <nav class="footer-links" aria-label="Footer">
      <a href="index.html" data-i18n="nav.home"></a>
      <a href="support.html" data-i18n="nav.support"></a>
      <a href="privacy.html" data-i18n="nav.privacy"></a>
      <a href="../index.html" data-i18n="footer.pcEdition"></a>
    </nav>
    <p data-i18n="footer.copyright"></p>
    <p data-i18n="footer.developer"></p>
  </footer>
  <aside class="sticky-cta" aria-label="Download">
    <div class="sticky-cta-inner">
      <a class="store-btn store-btn-primary" id="play-store-link" href="#"><svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M3.6 1.8c-.3.2-.5.6-.5 1v18.4c0 .4.2.8.5 1l.1.1 10.3-10.3v-.2L3.7 1.7l-.1.1z"/></svg><span data-i18n="stores.googlePlay"></span></a>
      <span class="store-btn store-btn-soon" aria-disabled="true"><svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M18.7 12.1c0-1.2-.7-2.3-1.8-2.8l-8.5-4.9c-1.1-.6-2.4-.6-3.5 0s-1.8 1.6-1.8 2.8v9.8c0 1.2.7 2.3 1.8 2.8l8.5 4.9c1.1.6 2.4.6 3.5 0s1.8-1.6 1.8-2.8v-9.8z"/></svg><span data-i18n="stores.appStore"></span><span class="store-soon-tag" data-i18n="stores.comingSoon"></span></span>
    </div>
  </aside>
  <script src="js/i18n.js"></script>
</body>
</html>
